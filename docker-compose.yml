services:
  db:
    image: postgres:16
    container_name: javaproje-db-1
    environment:
      POSTGRES_DB: contractrisk
      POSTGRES_USER: serad
      POSTGRES_PASSWORD: "1234"
    ports:
      - "65432:5432"   # host:container (host’ta 65432 boş bir port)
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:

rules:
  # ==========================================
  # ENGLISH BASE RULES
  # ==========================================
  - id: IND-001
    category: INDEMNITY
    name: Broad indemnity including all losses
    pattern: '(?is)indemnif(y|ication).*(all|any)\s+(loss(es)?|damages?)'
    weight: 1.0
    severity: 0.9
    locale: en
    mitigation: "Tazminat yükümlülüğü doğrudan zararlarla sınırlandırılmalı, dolaylı zararlar (kâr kaybı, itibar kaybı vb.) kapsam dışı bırakılmalıdır."

  - id: LOL-001
    category: LIMITATION_OF_LIABILITY
    name: No cap or unlimited liability
    pattern: '(?is)(unlimited|without\s+limit|no\s+cap).*liabilit(y|ies)'
    weight: 1.0
    severity: 1.0
    locale: en
    mitigation: "Sorumluluk tutarını dolaylı/sonuç zararları hariç tutarak yıllık sözleşme bedeli ile sınırlandırın."

  - id: GOV-TR-001
    category: GOVERNING_LAW
    name: Governing law outside Türkiye
    pattern: '(?is)governing\s+law\s+of\s+(?!t(u|ü)rkiye|turkish|istanbul|ankara).+'
    weight: 0.8
    severity: 0.8
    locale: en
    mitigation: "Sözleşmenin Türk Hukukuna (veya tarafların ortak belirleyeceği tarafsız bir hukuka) tabi olacak şekilde değiştirilmesi önerilir."

  - id: AUTO-001
    category: AUTO_RENEWAL
    name: Auto-renewal without termination window
    pattern: '(?is)auto(-|\s*)renew(al)?(?!.*(notice|termination|opt\s*out))'
    weight: 0.7
    severity: 0.7
    locale: en
    mitigation: "Otomatik yenileme maddesine, yenileme tarihinden en az 30 gün önce yazılı bildirim ile iptal edebilme hakkı eklenmelidir."

  - id: PAY-TR-001
    category: PAYMENT_TERMS
    name: Payment term exceeds 60 days
    pattern: '(?is)(net|payment\s*term).*?(6[1-9]|[7-9]\d|1\d\d)\s*day'
    weight: 0.6
    severity: 0.6
    locale: en
    mitigation: "Ödeme vadelerinin 30-45 gün bandına çekilmesi veya gecikme faizi uygulanacağı yönünde madde eklenmesi talep edilebilir."

  # ==========================================
  # TURKISH BASE RULES
  # ==========================================
  - id: LOL-TR-001
    category: LIMITATION_OF_LIABILITY
    name: Sorumluluğun sınırlandırılmaması / sınırsız sorumluluk
    pattern: "(?is)(sınırsız\\s+sorumluluk|her\\s+türlü\\s+zarar(ın|dan)\\s+mesuliyet|limit(\\s+)?olmaksızın\\s+sorumlu)"
    weight: 1.0
    severity: 1.0
    locale: tr
    mitigation: "Sorumluluğun en fazla 'sözleşme bedeli' kadar olacağı ve dolaylı zararların (kâr kaybı vb.) karşılanmayacağı açıkça belirtilmelidir."

  - id: IND-TR-001
    category: INDEMNITY
    name: Karşı tarafı her türlü zarar, talep, kayıp için tazmin etme
    pattern: "(?is)(tazmin\\s+edecektir|tazmin\\s+etmeyi\\s+kabul\\s+eder).*(her\\s+türlü\\s+(zarar|kayıp|masraf|talep))"
    weight: 0.9
    severity: 0.9
    locale: tr
    mitigation: "Tazminat yükümlülüğünün kusur oranına göre sınırlandırılması ve üçüncü taraf iddiaları için haber verme şartı getirilmesi önerilir."

  - id: TERM-TR-001
    category: TERMINATION
    name: Tek taraflı, sebep göstermeden fesih hakkı
    pattern: "(?is)(sebep\\s*göstermeksizin|herhangi\\s*bir\\s*gerekçe\\s*bildirmeksizin).*(tek\\s*taraflı\\s+fes(h|i))"
    weight: 0.9
    severity: 0.8
    locale: tr
    mitigation: "Fesih hakkının karşılıklı hale getirilmesi veya tek taraflı fesih durumunda en az 30 günlük ön ihbar süresi eklenmesi sağlanmalıdır."

  - id: AUTO-TR-001
    category: AUTO_RENEWAL
    name: Otomatik yenileme + açıkça fesih bildirimi penceresi yok
    pattern: "(?is)(otomatik\\s+olarak\\s+yenilen(ir|ecektir)).*(bildirim|fesih|iptal|sona\\s+erdirme)?(?!.*(30\\s*gün|60\\s*gün|yazılı\\s+bildirim))"
    weight: 0.7
    severity: 0.7
    locale: tr
    mitigation: "Sözleşme süresi bitiminden en az 30 gün önce yazılı bildirim ile otomatik yenilemenin durdurulabileceği hükmü eklenmelidir."

  - id: PAY-TR-002
    category: PAYMENT_TERMS
    name: Ödeme süresi 60 günü aşıyor
    pattern: "(?is)(ödeme\\s*süresi|fatura\\s*bedeli).*(6[1-9]|[7-9]\\d|1\\d\\d)\\s*gün"
    weight: 0.6
    severity: 0.6
    locale: tr
    mitigation: "Fatura ödeme vadesi 30 veya 45 güne düşürülmeli, gecikme durumunda temerrüt faizi işletileceği eklenmelidir."

  - id: LAW-TR-001
    category: GOVERNING_LAW
    name: Yetkili hukuk / yetkili mahkeme Türkiye dışı
    pattern: "(?is)(işbu\\s+ sözleşme|bu\\s+ sözleşme).*(yürürlükteki|tabi\\s+olacaktır|governed\\s+by).*(kanunlarına|hukukuna).*(?!t(u|ü)rkiye|t(u|ü)rk\\s+cumhuriyeti|istanbul|ankara|izmir)"
    weight: 0.8
    severity: 0.8
    locale: tr
    mitigation: "Uyuşmazlıkların çözümü için Türkiye Cumhuriyeti kanunlarının geçerli olması ve Türkiye'deki mahkemelerin yetkilendirilmesi önerilir."

  - id: DATA-TR-001
    category: DATA_PROTECTION
    name: Kişisel verilerin aktarımı / paylaşımı muğlak (KVKK riski)
    pattern: "(?is)(kişisel\\s+veri|kvkk|veri\\s+sahibi).*(paylaş(ılabilir|acaktır)|aktar(ılabilir|ılacaktır)).*(açık\\s+rıza|aydınlatma)?(?!.*(açık\\s+rıza|aydınlatma\\s+metni|sınırlı\\s+amaç))"
    weight: 0.85
    severity: 0.9
    locale: tr
    mitigation: "KVKK kapsamında veri aktarımının sadece belirli amaçlarla sınırlandırılması ve açık rıza metninin ayrıca alınacağı belirtilmelidir."

  - id: PRIV-001
    category: CONFIDENTIALITY
    name: Personal data usage without explicit consent
    pattern: '(?is)(kişisel\s+veri|personal\s+data).{0,200}(izinsiz|rızası\s+olmaksızın|without\s+(explicit\s+)?consent|unauthorized)'
    weight: 1.0
    severity: 0.95
    locale: multi
    mitigation: "Kişisel verinin paylaşımı veya işlenmesi açık yazılı rızaya bağlanmalı ve tarafın veriyi sınırsız kullanma hakkı sınırlandırılmalıdır."

  # ==========================================
  # SCORE-BASED & PATTERN LIST RULES
  # ==========================================
  - id: "TERM-001"
    category: "TERMINATION"
    score: 85
    explanation: "Karşı taraf hiçbir gerekçe göstermeden sözleşmeyi feshedebilir. Gelirin bir anda kesilebilir."
    mitigation: "Fesih hakkının karşılıklı (simetrik) hale getirilmesi veya tek taraflı fesih durumunda en az 30 günlük makul bir ön ihbar süresi eklenmesi önerilir."
    patterns:
      - "(terminate|termination).*(for (its )?convenience)"
      - "may terminate (this )?(agreement|contract) at any time (and )?for any reason"
      - "may terminate .* in its sole discretion"
      - "may terminate .* without cause"
      - "may terminate .* without (any )?penalty"
      - "may terminate .* at any time (and )?for any reason"
      - "may terminate .* upon written notice"
      - "at (its|their) convenience .* terminate"

  - id: "INS-001"
    category: "INSURANCE_OBLIGATION"
    score: 80
    explanation: "Belirli bir sigorta poliçesini belirli bir minimum limit ile sürdürme zorunluluğu var. Bu maliyet sende kalabilir."
    mitigation: "Talep edilen poliçe limitlerinin sözleşme bedeliyle orantılı olup olmadığını kontrol edin. Limitlerin düşürülmesini veya prim maliyetlerinin paylaşılmasını talep edebilirsiniz."
    patterns:
      - "(maintain|carry|procure).*(insurance|liability insurance)"
      - "insurance coverage (of|in) (amounts )?not less than"
      - "coverage of not less than \\$?[0-9][0-9,\\.]+(\\s*(per|each) (occurrence|claim))?"
      - "commercial general liability insurance"
      - "professional liability insurance"
      - "errors and omissions insurance"
      - "workers'? compensation insurance"

  - id: "LAW-001"
    category: "GOVERNING_LAW"
    score: 60
    explanation: "Sözleşmede yabancı bir hukuk seçilmiş olabilir. Anlaşmazlık olursa bu hukuka göre değerlendirilir."
    mitigation: "Sözleşmenin Türk Hukukuna (veya tarafların ortak belirleyeceği tarafsız ve bilindik bir hukuka) tabi olacak şekilde değiştirilmesi önerilir."
    patterns:
      - "governed by the laws of (the )?[A-Z][a-zA-Z]+"
      - "shall be governed by.*laws of"
      - "under the laws of the State of"
      - "in accordance with the laws of"
      - "Turkish law shall not apply"

  - id: "JUR-001"
    category: "JURISDICTION"
    score: 70
    explanation: "Uyuşmazlık halinde belirli bir mahkemenin/yerin münhasır yetkisi tanımlanmış. Bu seni yabancı bir mahkemeye zorlayabilir."
    mitigation: "Uyuşmazlıkların çözümü için şirketin merkezinin bulunduğu yerdeki (örneğin İstanbul veya Ankara) mahkemelerin yetkilendirilmesi önerilir."
    patterns:
      - "exclusive jurisdiction of the courts of"
      - "exclusive jurisdiction .* (County|Court|Courts|District)"
      - "venue shall (lie|be) in"
      - "submit to the (exclusive )?jurisdiction of"
      - "irrevocably submit to .* jurisdiction"

  # ==========================================
  # CUSTOM RULES
  # ==========================================
  - id: CUSTOM-TERM-001
    category: TERMINATION
    name: "Tek taraflı fesih (for convenience)"
    pattern: "(?is)(terminate|termination).*(for its convenience|at its convenience|without cause)"
    weight: 0.9
    severity: 0.8
    locale: en 
    mitigation: "Sebepsiz fesih (convenience) hakkı iptal edilmeli veya feshin sadece haklı sebeple (cause) yapılabileceği şekilde sınırlandırılmalıdır."

  - id: CUSTOM-IND-001
    category: INDEMNITY
    name: "Limitsiz tazminat / broad indemnity"
    pattern: "(?is)(indemnify|hold harmless).*(any and all|all claims|without limitation)"
    weight: 1.0
    severity: 0.95
    locale: en
    mitigation: "Tazminat yükümlülüğü doğrudan zararlarla sınırlandırılmalı, dolaylı zararlar (kâr kaybı, itibar kaybı vb.) kapsam dışı bırakılmalıdır."

  - id: CUSTOM-INS-001
    category: INSURANCE_OBLIGATION
    name: "High insurance coverage or additional insured clause"
    pattern: "(?is)(insurance).*(additional insured|combined single limit|one million)"
    weight: 0.7
    severity: 0.7
    locale: en
    mitigation: "Talep edilen poliçe limitlerinin makul seviyede olduğundan ve mevcut poliçelerinizle örtüştüğünden emin olun."

  - id: CUSTOM-IP-001
    category: INTELLECTUAL_PROPERTY_TRANSFER
    name: "IP ownership fully assigned to client"
    pattern: "(?is)(all material|work products|deliverables).*?(shall be|vested in).*?(commission|client)"
    weight: 0.85
    severity: 0.85
    locale: en
    mitigation: "Fikri mülkiyet haklarının tamamen devri yerine, müşteriye sadece projeyle sınırlı bir kullanım hakkı (lisans) verilmesi müzakere edilebilir."

  - id: CUSTOM-LAW-001
    category: GOVERNING_LAW
    name: "Foreign governing law or jurisdiction"
    pattern: "(?is)(laws of the state of|jurisdiction of).*(California|New York|Texas|Florida)"
    weight: 0.8
    severity: 0.8
    locale: en
    mitigation: "Uyuşmazlıkların ABD mahkemeleri yerine tarafsız bir tahkim merkezinde (örneğin ICC veya ISTAC) çözümlenmesi önerilir."